[build]
target = "index.html"
dist = "dist"
public_url = "/"

[watch]
watch = ["src", "styles", "public", "index.html"]
ignore = ["styles/generated.css"]

[serve]
addresses = ["127.0.0.1"]
port = 8080
open = false

[[hooks]]
stage = "post_build"
command = "node"
command_arguments = ["scripts/finalize-static-output.mjs"]
