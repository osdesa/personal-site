name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read

concurrency:
  # Supersede stale checks for a PR, while giving every main commit its own run.
  group: ci-${{ github.event_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  rust-quality:
    name: Rust quality and native release build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: clippy,rustfmt

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ci-${{ runner.os }}

      - name: Install Rust dependency auditor
        uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2
        with:
          tool: cargo-audit

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked --all-targets --all-features

      - name: Audit Rust dependencies
        run: cargo audit

      - name: Build all native release binaries
        run: cargo build --locked --release --all-features --bins

  web-build:
    name: CSS and production WebAssembly bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Install stable Rust with the WebAssembly target
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ci-${{ runner.os }}

      - name: Install Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate deployment shell
        run: |
          bash -n scripts/cloudflare-build.sh
          shellcheck scripts/cloudflare-build.sh

      - name: Audit frontend tooling dependencies
        run: npm audit --audit-level=moderate

      - name: Test build and server scripts
        run: npm run test:scripts

      - name: Install Trunk
        uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2
        with:
          tool: trunk@0.21.14

      - name: Build styles
        run: npm run css:build

      - name: Build production WebAssembly bundle
        run: trunk build --release

      - name: Validate production static output
        run: npm run test:static

      - name: Upload production bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: production-bundle
          path: dist
          if-no-files-found: error
          retention-days: 1

  browser-accessibility:
    name: Browser accessibility regression checks
    needs: web-build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Install Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Restore Playwright browser cache
        id: playwright-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium and its system dependencies
        run: npx playwright install --with-deps chromium

      - name: Save Playwright browser cache
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Download production bundle
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: production-bundle
          path: dist

      - name: Run browser accessibility regression checks
        run: npm run test:browser:dist

  performance-budget:
    name: Lighthouse production budget
    needs: web-build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Install Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Restore Playwright browser cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium and its system dependencies
        run: npx playwright install --with-deps chromium

      - name: Download production bundle
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: production-bundle
          path: dist

      - name: Enforce Lighthouse quality budgets
        run: npm run test:performance
