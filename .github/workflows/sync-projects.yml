name: Synchronize portfolio projects

on:
  schedule:
    - cron: "41 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: synchronize-portfolio-projects
  cancel-in-progress: false

jobs:
  synchronize:
    name: Synchronize selected GitHub projects
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out trusted main
        uses: actions/checkout@v6
        with:
          ref: main
          persist-credentials: false

      - name: Require synchronization secrets
        env:
          PORTFOLIO_READ_TOKEN: ${{ secrets.PORTFOLIO_GITHUB_TOKEN }}
          SYNC_TOKEN: ${{ secrets.PORTFOLIO_SYNC_TOKEN }}
        run: |
          if [ -z "$PORTFOLIO_READ_TOKEN" ]; then
            echo "PORTFOLIO_GITHUB_TOKEN is required to read selected public and private repository metadata." >&2
            exit 1
          fi
          if [ -z "$SYNC_TOKEN" ]; then
            echo "PORTFOLIO_SYNC_TOKEN is required to push automation/project-sync and manage its pull request." >&2
            exit 1
          fi

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2

      - name: Synchronize validated project data
        env:
          PORTFOLIO_GITHUB_TOKEN: ${{ secrets.PORTFOLIO_GITHUB_TOKEN }}
        run: cargo run --locked --release --features project-sync --bin sync-projects -- --root "$GITHUB_WORKSPACE"

      - name: Verify synchronized repository
        run: |
          cargo fmt --check
          cargo clippy --locked --all-targets --all-features -- -D warnings
          cargo test --locked --all-targets --all-features
          cargo build --locked --release --all-features --bins

      - name: Identify the trusted synchronization actor
        id: actor
        env:
          GH_TOKEN: ${{ secrets.PORTFOLIO_SYNC_TOKEN }}
        run: echo "login=$(gh api user --jq .login)" >> "$GITHUB_OUTPUT"

      - name: Create or update project synchronization pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PORTFOLIO_SYNC_TOKEN }}
          add-paths: src/generated_projects.rs
          branch: automation/project-sync
          base: main
          delete-branch: true
          commit-message: "chore(projects): synchronize portfolio data"
          title: "chore(projects): synchronize portfolio data"
          body: |
            <!-- personal-site-sync:projects -->
            Synchronizes the newest four validated portfolio repositories.

            The Rust synchronizer selected the authenticated `portfolio` list
            (or a documented topic/allowlist fallback), fetched optional metadata,
            filtered archived repositories and forks, and generated deterministic
            static Rust data without exposing the token.

      - name: Verify auto-merge eligibility and enable native auto-merge
        if: steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.PORTFOLIO_SYNC_TOKEN }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
          TRUSTED_AUTHOR: ${{ steps.actor.outputs.login }}
        run: |
          pr="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER")"
          head_branch="$(jq -r '.head.ref' <<<"$pr")"
          base_branch="$(jq -r '.base.ref' <<<"$pr")"
          head_repository="$(jq -r '.head.repo.full_name // empty' <<<"$pr")"
          author="$(jq -r '.user.login' <<<"$pr")"
          body="$(jq -r '.body // empty' <<<"$pr")"
          marker_present=false
          if grep -Fq '<!-- personal-site-sync:projects -->' <<<"$body"; then marker_present=true; fi
          arguments=(
            --kind projects
            --head-branch "$head_branch"
            --base-branch "$base_branch"
            --head-repository "$head_repository"
            --repository "$GITHUB_REPOSITORY"
            --author "$author"
            --trusted-author "$TRUSTED_AUTHOR"
          )
          if [ "$marker_present" = true ]; then arguments+=(--marker-present); fi
          cargo run --locked --release --bin verify-auto-merge -- "${arguments[@]}"
          gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --auto --squash --delete-branch
          {
            echo "### Project synchronization"
            echo "Created or updated #$PR_NUMBER on automation/project-sync."
            echo "GitHub native auto-merge is enabled and will wait for required checks and branch protection."
          } >> "$GITHUB_STEP_SUMMARY"
